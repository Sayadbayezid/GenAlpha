name: Package On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Enter a tag name for this release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare metadata
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          
          # Check if triggered manually, otherwise use standard git tag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.manual_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          
          PKG_NAME="${REPO_NAME}-${TAG}"
          echo "REPO_NAME=${REPO_NAME}" >> "${GITHUB_ENV}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"
          echo "PKG_NAME=${PKG_NAME}" >> "${GITHUB_ENV}"

      - name: Build package
        run: |
          # Stage the payload OUTSIDE the repo so the archive doesn't
          # self-include the `dist/` directory we create below.
          STAGE="${RUNNER_TEMP}/${PKG_NAME}"
          mkdir -p "${STAGE}"

          # Skill runtime allowlist. Repository assets such as tests/, docs/,
          # CI, README, governance files, and packaging metadata are not needed
          # inside installed skill bundles.
          for path in SKILL.md scripts resources; do
            rsync -a \
              --exclude='__pycache__/' \
              --exclude='*.pyc' \
              --exclude='seo-report-*.html' \
              --exclude='tmp/' \
              "${path}" "${STAGE}/"
          done

          mkdir -p dist
          # Archive contents are flat (no top-level dir wrapper); installers
          # auto-detect either layout.
          (cd "${STAGE}" && zip -r "${GITHUB_WORKSPACE}/dist/${PKG_NAME}.zip" .)
          (cd "${STAGE}" && tar -czf "${GITHUB_WORKSPACE}/dist/${PKG_NAME}.tar.gz" .)
          ls -la dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}
          path: |
            dist/${{ env.PKG_NAME }}.zip
            dist/${{ env.PKG_NAME }}.tar.gz

      - name: Publish release asset
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.REPO_NAME }} ${{ env.TAG }}
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/${{ env.PKG_NAME }}.zip
            dist/${{ env.PKG_NAME }}.tar.gz
